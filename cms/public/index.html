<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coroutines Learning Notes · CMS</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <header class="sidebar-head">
          <h1>Coroutines Learning Notes</h1>
          <p>Dave Leeds · Kotlin Coroutines</p>
        </header>
        <nav id="menu" aria-label="Course lessons"></nav>
      </aside>

      <main id="main">
        <section id="editor" hidden>
          <div class="editor-head">
            <div>
              <p class="module-label" id="editor-module"></p>
              <h2 id="editor-title"></h2>
            </div>
            <div class="editor-actions">
              <span id="status" class="status"></span>
              <button id="preview-btn" class="btn btn-ghost" disabled title="Save the note first to preview it">Preview ↗</button>
              <button id="save-btn" class="btn btn-primary">Save note</button>
            </div>
          </div>
          <div id="fields"></div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
